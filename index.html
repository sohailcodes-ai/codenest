<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CodeNest Academy — Learn to Code in Hyderabad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;scroll-behavior:smooth}
:root{
  --orange:#FF6B35;--orange2:#FF9A5C;--orange-light:#FFF0EA;
  --blue:#1E3A8A;--blue2:#3B5FC0;--blue-light:#EEF2FF;
  --green:#10B981;--green-light:#D1FAE5;
  --yellow:#FBBF24;--yellow-light:#FEF3C7;
  --purple:#7C3AED;--purple-light:#EDE9FE;
  --dark:#111827;--gray:#6B7280;--light:#F9FAFB;--white:#fff;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--white);color:var(--dark);overflow-x:hidden}
a{text-decoration:none;color:inherit}

/* ---- NAV ---- */
nav{background:var(--white);border-bottom:2px solid #F3F4F6;padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,var(--orange),var(--orange2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.1rem;color:white;box-shadow:0 4px 12px rgba(255,107,53,0.4)}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:700;color:var(--dark);letter-spacing:-0.01em}
.logo-text span{color:var(--orange)}
.nav-links{display:flex;gap:1.8rem;font-size:0.9rem;font-weight:700;color:var(--gray)}
.nav-links a:hover{color:var(--orange)}
.nav-cta{background:var(--orange);color:white;padding:0.55rem 1.4rem;border-radius:50px;font-size:0.9rem;font-weight:600;box-shadow:0 4px 14px rgba(255,107,53,0.4);transition:transform 0.2s}
.nav-cta:hover{transform:scale(1.05)}

/* ---- HERO ---- */
.hero{background:linear-gradient(135deg,#FFF7F4 0%,#F0F5FF 100%);padding:5rem 2rem 4rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;background:radial-gradient(circle,rgba(255,107,53,0.12),transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(30,58,138,0.08),transparent 70%);pointer-events:none}
.hero-inner{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--orange-light);border:1.5px solid rgba(255,107,53,0.25);color:var(--orange);padding:0.35rem 1rem;border-radius:50px;font-size:0.78rem;font-weight:600;letter-spacing:0.04em;margin-bottom:1.2rem}
.hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(1.7rem,3.5vw,2.6rem);font-weight:700;line-height:1.2;letter-spacing:-0.02em;margin-bottom:1.2rem;color:var(--dark)}
.hero h1 em{color:var(--orange);font-style:normal}
.hero h1 span{color:var(--blue)}
.hero p{font-size:1rem;color:var(--gray);line-height:1.7;margin-bottom:1.8rem;max-width:440px}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-orange{background:var(--orange);color:white;padding:0.8rem 1.8rem;border-radius:50px;font-weight:600;font-size:0.9rem;box-shadow:0 6px 20px rgba(255,107,53,0.4);display:inline-block;transition:transform 0.2s}
.btn-orange:hover{transform:translateY(-2px)}
.btn-outline{border:2px solid var(--blue);color:var(--blue);padding:0.8rem 1.8rem;border-radius:50px;font-weight:600;font-size:0.9rem;display:inline-block;transition:all 0.2s}
.btn-outline:hover{background:var(--blue);color:white}
.trust-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:1.8rem}
.trust-pill{display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid #E5E7EB;padding:0.35rem 0.9rem;border-radius:50px;font-size:0.78rem;font-weight:500;color:var(--dark)}
.trust-pill .dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.hero-photo-wrap{position:relative;display:flex;justify-content:center}
.hero-photo-bg{width:320px;height:400px;background:linear-gradient(145deg,var(--orange-light),var(--blue-light));border-radius:24px 24px 80px 24px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.15);position:relative}
.hero-photo-bg img{width:100%;height:100%;object-fit:cover;object-position:center top}
.photo-badge{position:absolute;bottom:-14px;left:-14px;background:var(--orange);color:white;padding:0.6rem 1rem;border-radius:12px;font-size:0.8rem;font-weight:800;box-shadow:0 6px 20px rgba(255,107,53,0.4)}
.photo-badge2{position:absolute;top:20px;right:-14px;background:var(--blue);color:white;padding:0.5rem 0.9rem;border-radius:10px;font-size:0.78rem;font-weight:800;box-shadow:0 6px 16px rgba(30,58,138,0.4)}

/* ---- SECTIONS ---- */
.section{padding:4rem 2rem;max-width:1000px;margin:0 auto}
.section-tag{display:inline-block;font-size:0.72rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--orange);margin-bottom:0.5rem}
.section-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(1.4rem,2.5vw,2rem);font-weight:700;letter-spacing:-0.02em;margin-bottom:0.8rem;color:var(--dark)}
.section-sub{font-size:1rem;color:var(--gray);max-width:500px;line-height:1.6;margin-bottom:2.5rem}

/* ---- WHY ---- */
.why-bg{background:#F9FAFB;border-top:2px solid #F3F4F6;border-bottom:2px solid #F3F4F6}
.why-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1.2rem}
.why-card{background:var(--white);border-radius:16px;padding:1.5rem;border:2px solid #F3F4F6;transition:border-color 0.2s,transform 0.2s}
.why-card:hover{border-color:var(--orange);transform:translateY(-3px)}
.why-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin-bottom:1rem}
.why-icon.orange{background:var(--orange-light)}
.why-icon.blue{background:var(--blue-light)}
.why-icon.green{background:var(--green-light)}
.why-icon.yellow{background:var(--yellow-light)}
.why-icon.purple{background:var(--purple-light)}
.why-card h3{font-size:0.9rem;font-weight:600;margin-bottom:0.4rem}
.why-card p{font-size:0.82rem;color:var(--gray);line-height:1.5}

/* ---- COURSES ---- */
.courses-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:1rem}
.course-card{border-radius:16px;padding:1.4rem;border:2px solid #F3F4F6;transition:all 0.2s;position:relative;overflow:hidden;background:var(--white)}
.course-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.course-card.py::before{background:linear-gradient(90deg,#3B82F6,#1E3A8A)}
.course-card.web::before{background:linear-gradient(90deg,#F97316,#EF4444)}
.course-card.js::before{background:linear-gradient(90deg,#FBBF24,#F59E0B)}
.course-card.html::before{background:linear-gradient(90deg,#E55B4D,#FF9472)}
.course-card.java::before{background:linear-gradient(90deg,#8B5CF6,#6D28D9)}
.course-card.ms::before{background:linear-gradient(90deg,#10B981,#059669)}
.course-card:hover{border-color:var(--orange);transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.08)}
.course-tag{font-size:0.68rem;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;padding:3px 9px;border-radius:50px;display:inline-block;margin-bottom:0.8rem}
.course-tag.beginner{background:var(--green-light);color:#059669}
.course-tag.intermediate{background:var(--yellow-light);color:#B45309}
.course-card h4{font-size:0.95rem;font-weight:800;margin-bottom:0.4rem}
.course-card p{font-size:0.8rem;color:var(--gray);line-height:1.4}
.course-price{margin-top:0.9rem;font-size:0.9rem;font-weight:800;color:var(--orange)}

/* ---- INSTRUCTOR ---- */
.instructor-bg{background:linear-gradient(135deg,#F0F5FF,#FFF7F4)}
.instructor-inner{display:grid;grid-template-columns:auto 1fr;gap:2.5rem;align-items:start;background:var(--white);border-radius:24px;padding:2.5rem;border:2px solid #E5E7EB;box-shadow:0 4px 24px rgba(0,0,0,0.06)}
.instr-photo{width:140px;height:170px;border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.15);flex-shrink:0}
.instr-photo img{width:100%;height:100%;object-fit:cover;object-position:center top}
.instr-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:-0.01em;margin-bottom:0.2rem}
.instr-role{font-size:0.85rem;font-weight:700;color:var(--orange);margin-bottom:1rem}
.instr-bio{font-size:0.9rem;color:var(--gray);line-height:1.7;margin-bottom:1.2rem;max-width:520px}
.skill-tags{display:flex;flex-wrap:wrap;gap:7px}
.skill-tag{background:#F3F4F6;padding:5px 12px;border-radius:50px;font-size:0.78rem;font-weight:500;color:var(--dark)}
.stat-row{display:flex;gap:1.5rem;margin-top:1.2rem;flex-wrap:wrap}
.stat-box{background:var(--orange-light);padding:0.6rem 1.1rem;border-radius:10px;text-align:center}
.stat-box .num{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.3rem;font-weight:800;color:var(--orange)}
.stat-box .lbl{font-size:0.72rem;font-weight:700;color:var(--gray)}

/* ---- PRICING ---- */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:1.5rem}
.price-card{background:var(--white);border:2px solid #E5E7EB;border-radius:20px;padding:2rem;transition:all 0.2s}
.price-card.featured{border-color:var(--orange);box-shadow:0 8px 30px rgba(255,107,53,0.2)}
.price-card.featured .popular-badge{display:inline-block;background:var(--orange);color:white;font-size:0.72rem;font-weight:800;padding:4px 12px;border-radius:50px;margin-bottom:0.8rem}
.popular-badge{display:none}
.plan-name{font-size:0.8rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;color:var(--gray);margin-bottom:0.5rem}
.plan-price{font-family:'Plus Jakarta Sans',sans-serif;font-size:2rem;font-weight:700;color:var(--dark);letter-spacing:-0.02em}
.plan-price sub{font-size:0.9rem;font-weight:700;color:var(--gray);font-family:'Plus Jakarta Sans',sans-serif}
.plan-note{font-size:0.8rem;font-weight:700;color:var(--orange);margin:0.3rem 0 1.2rem}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:0.6rem;margin-bottom:1.5rem}
.plan-features li{display:flex;align-items:center;gap:8px;font-size:0.85rem;font-weight:600}
.check-icon{width:18px;height:18px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--green);flex-shrink:0;font-weight:800}
.plan-btn{display:block;text-align:center;padding:0.75rem;border-radius:50px;font-weight:800;font-size:0.9rem;cursor:pointer;transition:all 0.2s}
.plan-btn.orange{background:var(--orange);color:white;box-shadow:0 4px 14px rgba(255,107,53,0.35)}
.plan-btn.blue{background:var(--blue);color:white;box-shadow:0 4px 14px rgba(30,58,138,0.25)}
.plan-btn.outline{border:2px solid #E5E7EB;color:var(--dark)}
.plan-btn:hover{transform:scale(1.03)}

/* ---- CONTACT ---- */
.contact-bg{background:linear-gradient(135deg,var(--blue) 0%,var(--blue2) 100%);color:white}
.contact-inner{max-width:1000px;margin:0 auto;padding:4rem 2rem}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:1.5rem;margin-top:2.5rem}
.contact-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,0.2);border-radius:16px;padding:1.4rem;display:flex;gap:1rem;align-items:flex-start;transition:background 0.2s}
.contact-card:hover{background:rgba(255,255,255,0.18)}
.contact-icon{width:44px;height:44px;background:rgba(255,255,255,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.contact-card h4{font-size:0.9rem;font-weight:800;margin-bottom:0.3rem}
.contact-card p{font-size:0.82rem;opacity:0.8;line-height:1.4}
.contact-card a{color:white;font-weight:700;font-size:0.85rem;opacity:0.9;word-break:break-all}

/* ---- FOOTER ---- */
footer{background:var(--dark);color:rgba(255,255,255,0.5);text-align:center;padding:2rem;font-size:0.82rem;font-weight:600}
footer span{color:var(--orange)}

/* ---- RESPONSIVE ---- */
@media(max-width:700px){
  .hero-inner{grid-template-columns:1fr;text-align:center}
  .hero p{margin:0 auto 1.8rem}
  .hero-btns{justify-content:center}
  .trust-pills{justify-content:center}
  .hero-photo-wrap{order:-1}
  .hero-photo-bg{width:260px;height:320px}
  .instructor-inner{grid-template-columns:1fr;text-align:center}
  .instr-photo{width:120px;height:150px;margin:0 auto}
  .skill-tags{justify-content:center}
  .stat-row{justify-content:center}
  .nav-links{display:none}
}
</style>
</head>
